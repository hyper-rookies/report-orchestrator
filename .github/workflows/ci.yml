name: CI

"on":
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    env:
      BACKEND_DIR: backend   # TODO: 너 레포 백엔드 폴더명으로 바꿔 (예: services, server, .)
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.BACKEND_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "pyproject.toml" ]; then
            pip install -e ".[dev]" || pip install -e "."
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No pyproject.toml or requirements.txt in $PWD" && exit 1
          fi

      - name: Preflight checks
        run: bash scripts/preflight_ci.sh

      - name: Lint (ruff)
        run: |
          python -m pip install ruff
          ruff check .

      - name: Unit tests (pytest)
        run: |
          python -m pip install pytest
          pytest -q

  orchestrator_lambda:
    name: Orchestrator Lambda (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend/services/report-orchestrator-lambda

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/services/report-orchestrator-lambda/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (jest)
        run: npm test

      - name: Type check
        run: npm run build
